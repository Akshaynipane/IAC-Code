AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to deploy an intentionally misconfigured EC2 instance for security testing'

Parameters:
  InstanceType:
    Type: String
    Description: EC2 instance type
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Description: Latest Amazon Linux 2023 AMI from SSM Parameter Store
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  SSHLocation:
    Type: String
    Description: CIDR block allowed SSH access. Default intentionally opens SSH to the internet.
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$

Resources:
  InsecureSecurityGroup:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Intentionally insecure security group with internet exposure
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHLocation
          Description: Intentionally open SSH access
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Open HTTP access to the internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Open HTTPS access to the internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-insecure-sg'
        - Key: ManagedBy
          Value: CloudFormation

  MisconfiguredEC2Instance:
    Type: 'AWS::EC2::Instance'
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SecurityGroupIds:
        - !Ref InsecureSecurityGroup
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
        HttpPutResponseHopLimit: 3
        InstanceMetadataTags: enabled
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "Intentionally misconfigured EC2 instance for security validation" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-ec2'
        - Key: Environment
          Value: SecurityTesting
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref MisconfiguredEC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  PublicIp:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt MisconfiguredEC2Instance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'

  SecurityGroupId:
    Description: Security group attached to the EC2 instance
    Value: !Ref InsecureSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'

  IMDSv2Status:
    Description: IMDSv2 token requirement status
    Value: required
    Export:
      Name: !Sub '${AWS::StackName}-IMDSv2Status'

