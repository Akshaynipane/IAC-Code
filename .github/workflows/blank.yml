
name: Cortex CLI Code Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CORTEX_API_KEY: ${{secrets.CORTEX_API_KEY}}
  CORTEX_API_KEY_ID: ${{secrets.CORTEX_API_KEY_ID}}
  CORTEX_API_URL: https://api-unifiedcloudsecops.xdr.us.paloaltonetworks.com
  
jobs:
  cortex-code-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Verify Node.js Version
      run: node -v

    - name: Download cortexcli
      run: |
        set -x
        crtx_resp=$(curl "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
          -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
          -H "Authorization: ${CORTEX_API_KEY}")
        crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
        curl -o cortexcli $crtx_url
        chmod +x cortexcli
        ./cortexcli --version

    - name: Run Cortex CLI Code Scan
      id: cortex-scan
      run: |
        ./cortexcli \
          --api-base-url "${CORTEX_API_URL}" \
          --api-key "${CORTEX_API_KEY}" \
          --api-key-id "${CORTEX_API_KEY_ID}" \
          code scan \
          --directory "${{github.workspace}}" \
          --repo-id "${{github.repository}}" \
          --branch "${{github.ref_name}}" \
          --source "GITHUB_ACTIONS" \
          --create-repo-if-missing \
          --output-format json > scan_results.json || true
    
    - name: Check Scan Results and Block on Critical Issues
      run: |
        if [ -f scan_results.json ]; then
          echo "Analyzing scan results..."
          
          # Extract critical and high severity issues count
          critical_count=$(jq '[.results[]? | select(.severity == "CRITICAL")] | length' scan_results.json 2>/dev/null || echo "0")
          high_count=$(jq '[.results[]? | select(.severity == "HIGH")] | length' scan_results.json 2>/dev/null || echo "0")
          
          echo "Critical issues found: $critical_count"
          echo "High severity issues found: $high_count"
          
          # Block workflow if critical or high severity issues are found
          if [ "$critical_count" -gt 0 ] || [ "$high_count" -gt 0 ]; then
            echo "❌ BLOCKING: Found $critical_count critical and $high_count high severity issues"
            echo "Please fix these security issues before merging."
            exit 1
          else
            echo "✅ No critical or high severity issues found. Workflow can proceed."
          fi
        else
          echo "⚠️ Warning: Scan results file not found. Proceeding with caution."
        fi
    
    - name: Upload Scan Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cortex-scan-results
        path: scan_results.json
        retention-days: 30
